<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe - GameLab</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">

  <link rel="stylesheet" href="../../style.css">
</head>

<body class="d-flex justify-content-center align-items-center min-vh-100">

  <div class="card bg-white text-dark shadow-lg p-4 text-center rounded-4" style="max-width: 360px; width: 100%;">
    <h2 class="fw-bold mb-2 text-primary">Tic Tac Toe</h2>

    <p id="turn-indicator" class="mb-2 fw-semibold fs-5">
      Giliran: <span class="badge bg-primary">X</span>
    </p>

    <p id="ttt-message" class="mb-3 fw-bold" style="min-height: 24px;"></p>

    <div class="grid-template mb-3">
      <button class="cell btn"></button>
      <button class="cell btn"></button>
      <button class="cell btn"></button>
      <button class="cell btn"></button>
      <button class="cell btn"></button>
      <button class="cell btn"></button>
      <button class="cell btn"></button>
      <button class="cell btn"></button>
      <button class="cell btn"></button>
    </div>

    <button id="ttt-reset" class="btn btn-outline-primary w-100 mb-3 fw-bold">
      <i class="fa-solid fa-rotate-right"></i> Muat Ulang
    </button>
    
    <a href="../../index.html" class="btn-back justify-content-center">
      <i class="fa-solid fa-arrow-left"></i> Kembali ke Dashboard
    </a>
  </div>
  
  <script src="game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App - GameLab</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
  
  <link rel="stylesheet" href="../../style.css">
</head>
<body class="d-flex flex-column justify-content-center align-items-center min-vh-100 py-4">

  <div class="card bg-white text-dark shadow-lg p-4 rounded-4 w-100" style="max-width: 500px;">
    
    <h2 class="text-center text-primary fw-bold mb-4 border-bottom pb-2">Quiz Informatika</h2>
    
    <div id="quiz-content">
      <div class="fw-semibold fs-5 mb-3" id="question">Pertanyaan akan muncul di sini</div>
      
      <div class="d-flex flex-column gap-2" id="options"></div>
      
      <div class="fw-bold mt-3 text-center" id="feedback" style="min-height: 24px;"></div>
      
      <button class="btn btn-primary mt-3 w-100 fw-bold d-none" id="next-btn">
        Selanjutnya <i class="fa-solid fa-arrow-right"></i>
      </button>
    </div>

    <div id="quiz-result" class="text-center mt-3"></div>

    <hr class="my-4 text-secondary">
    
    <a href="../../index.html" class="btn-back justify-content-center w-100">
      <i class="fa-solid fa-arrow-left"></i> Kembali ke Dashboard
    </a>
  </div>

  <script src="quiz.js"></script>
</body>
</html>

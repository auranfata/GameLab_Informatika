<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Game - GameLab</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
  
  <link rel="stylesheet" href="../../style.css">
</head>
<body class="d-flex flex-column align-items-center justify-content-center min-vh-100 py-4">

  <div class="card bg-dark text-white shadow-lg p-4 text-center rounded-4 w-100" style="max-width: 650px;">
    
    <div class="mb-3">
      <h2 class="fw-bold text-primary mb-1">Memory Card Game</h2>
      <p class="text-warning small m-0">Cocokkan semua kartu sebelum waktunya habis!</p>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4 px-3 py-2 bg-secondary rounded-3">
      <h5 class="m-0"><i class="fa-solid fa-stopwatch"></i> Waktu: <span id="timer" class="text-warning">80</span>s</h5>
      <h5 class="m-0"><i class="fa-solid fa-star"></i> Score: <span id="score" class="text-success">0</span></h5>
    </div>

    <div class="memory-board mb-4" id="board"></div>

    <a href="../../index.html" class="btn-back justify-content-center w-100">
      <i class="fa-solid fa-arrow-left"></i> Kembali ke Dashboard
    </a>
  </div>

  <div class="modal fade" id="resultModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-light border-primary">
        <div class="modal-header border-secondary">
          <h5 class="modal-title fw-bold text-primary">Game Over</h5>
        </div>
        <div class="modal-body text-center py-4">
          <h4 id="resultMessage" class="fw-bold"></h4>
        </div>
        <div class="modal-footer border-secondary justify-content-center">
          <button type="button" class="btn btn-primary px-4 fw-bold" onclick="location.reload()">
            <i class="fa-solid fa-rotate-right"></i> Main Lagi
          </button>
          <a href="../../index.html" class="btn btn-outline-light px-4">Dashboard</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>

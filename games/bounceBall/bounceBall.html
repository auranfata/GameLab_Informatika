<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bounce Ball - GameLab</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
  
  <link rel="stylesheet" href="../../style.css">
</head>
<body class="d-flex justify-content-center align-items-center min-vh-100 flex-column">

  <div class="card bg-dark text-white shadow-lg p-3 text-center rounded-4 mb-3" style="width: 440px;">
    
    <div class="d-flex justify-content-between align-items-center mb-2 px-2">
      <h4 class="fw-bold m-0 text-primary">Bounce Ball</h4>
      <div id="hud" class="d-flex align-items-center m-0 p-0" style="max-width: none;">
        <span id="score" class="me-3 fw-bold">Score: 0</span>
        <div id="lives" class="d-flex"></div>
      </div>
    </div>

    <div class="position-relative d-flex justify-content-center">
      <canvas id="gameCanvas" width="400" height="500" class="rounded-3 border border-2 border-primary"></canvas>
      
      <div id="message" class="hidden position-absolute top-50 start-50 translate-middle w-75 p-3 rounded-3 shadow text-dark text-center" style="background: rgba(147, 218, 151, 0.95); z-index: 10;">
        <h5 id="resultText" class="fw-bold mb-3"></h5>
        <p class="m-0 text-muted small"><i class="fa-solid fa-keyboard"></i> Tekan <kbd>Space</kbd> untuk bermain lagi</p>
      </div>
    </div>

    <div class="mt-3">
      <a href="../../index.html" class="btn-back justify-content-center w-100">
        <i class="fa-solid fa-arrow-left"></i> Kembali ke Dashboard
      </a>
    </div>

  </div>

  <script src="game.js"></script>
</body>
</html>
